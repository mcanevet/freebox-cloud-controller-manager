# Secret template — fill in FREEBOX_APP_TOKEN before applying.
# Do NOT commit a version of this file with real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: freebox-cloud-config
  namespace: kube-system
type: Opaque
stringData:
  FREEBOX_ENDPOINT: "https://mafreebox.freebox.fr"
  FREEBOX_API_VERSION: "v8"
  FREEBOX_APP_ID: "fr.freebox.ccm"
  FREEBOX_APP_TOKEN: "<your-private-token>"
